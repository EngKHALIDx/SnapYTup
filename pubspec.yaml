name: snap_yt
description: "MediaGrab — Apple-designed video & music downloader."
publish_to: 'none'
version: 3.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Networking & downloads
  dio: ^5.7.0

  # YouTube parsing
  youtube_explode_dart: ^3.1.0

  # Storage
  path_provider: ^2.1.5
  path: ^1.9.0

  # Media players
  video_player: ^2.9.2
  chewie: ^1.8.5
  just_audio: ^0.9.43
  audio_session: ^0.1.21

  # Image caching (fixes performance issue with Image.network)
  cached_network_image: ^3.4.1

  # Collection (firstWhereOrNull etc.)
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - CHANGELOG.md
