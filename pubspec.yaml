name: snap_yt
description: "MediaGrab — A multi-platform video & audio downloader with built-in players and browser (Snaptube-style, NOT affiliated with Snaptube)."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking & downloads
  dio: ^5.7.0
  http: ^1.2.2
  connectivity_plus: ^6.1.1
  cached_network_image: ^3.4.1

  # YouTube parsing
  youtube_explode_dart: ^2.3.6

  # Permissions & storage
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  path: ^1.9.0
  shared_preferences: ^2.3.3
  photo_manager: ^3.6.4
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.2

  # Built-in browser + video detection
  webview_flutter: ^4.10.0
  html: ^0.15.4

  # Media players
  video_player: ^2.9.2
  chewie: ^1.8.5
  just_audio: ^0.9.43
  audio_service: ^0.18.17
  audio_session: ^0.1.21

  # UI / Utils
  hexcolor: ^3.0.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  flutter_markdown: ^0.7.4+3
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.18.0

  # Notifications & foreground service for downloads
  flutter_local_notifications: ^18.0.1

  # Video trimming (optional, will lazy-load ffmpeg at runtime)
  # video_trimmer: ^3.0.1  # commented out — heavy, can enable later

  # File picker for custom save paths
  file_picker: ^8.1.7

  # Clipboard watcher — auto-detect copied URLs (Snaptube feature)
  # (Native dart:io clipboard API used as fallback when this package isn't available)

  # Floating window / PiP — Snaptube-style floating player
  floating: ^3.0.0

  # Receive sharing intents (share-to-app)
  receive_sharing_intent: ^1.8.0

  # Localizations / 49 languages
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/applogo.png
    - assets/applogo_bg.png
    - CHANGELOG.md
