# Codemagic configuration for SnapYT
# https://docs.codemagic.io/yaml/yaml-getting-started/

definitions:
  environment: &android_environment
    JAVA_HOME: /Users/builder/.jabba/jdk/17.0.13+11
    vars:
      PACKAGE_NAME: "com.gokei.yt_download"
  scripts:
    - &set_up_pubspec
      name: Set up local pubspec
      script: |
        cd $CM_BUILD_DIR
    - &flutter_analyze
      name: Flutter analyze
      script: |
        cd $CM_BUILD_DIR
        flutter analyze --no-fatal-infos
    - &flutter_test
      name: Flutter test
      script: |
        cd $CM_BUILD_DIR
        flutter test
      failure: continue  # don't block the build if a test fails
    - &build_apk
      name: Build Android APK
      script: |
        cd $CM_BUILD_DIR
        flutter build apk --release \
          --target-platform android-arm64,android-arm,android-x64

workflows:
  android-workflow:
    name: SnapYT Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      <<: *android_environment
      groups:
        - google_play  # (optional) if you plan to publish
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: source
      cancel_previous_builds: true
    scripts:
      - *set_up_pubspec
      - *flutter_analyze
      - *flutter_test
      - *build_apk
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - khalid774666@gmail.com
