# Codemagic configuration for MediaGrab (Snaptube-style downloader)
# https://docs.codemagic.io/yaml/yaml-getting-started/

definitions:
  environment: &android_environment
    vars:
      PACKAGE_NAME: "com.gokei.yt_download"
  scripts:
    - &set_up
      name: Set up Flutter
      script: |
        cd $CM_BUILD_DIR
        flutter --version
    - &pub_get
      name: Flutter pub get
      script: |
        cd $CM_BUILD_DIR
        flutter pub get
    - &analyze
      name: Flutter analyze
      script: |
        cd $CM_BUILD_DIR
        flutter analyze --no-fatal-infos
      failure: continue
    - &test
      name: Flutter test
      script: |
        cd $CM_BUILD_DIR
        flutter test
      failure: continue
    - &build_apk
      name: Build Android APK
      script: |
        cd $CM_BUILD_DIR
        flutter build apk --release \
          --target-platform android-arm64,android-arm,android-x64

workflows:
  android-workflow:
    name: MediaGrab Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      <<: *android_environment
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: source
      cancel_previous_builds: true
    scripts:
      - *set_up
      - *pub_get
      - *analyze
      - *test
      - *build_apk
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - khalid774666@gmail.com
